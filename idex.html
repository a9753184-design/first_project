<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ferari</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #000;
            color: #fff;
        }

        .splash-screen {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(45deg, #000, #1a0000, #2d0000, #000);
            background-size: 400% 400%;
            animation: splashGradient 15s ease infinite;
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 22px;
            overflow: hidden;
            transition: opacity 0.5s ease;
            padding: 24px;
            box-sizing: border-box;
        }

        .splash-video {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            min-width: 100%;
            min-height: 100%;
            z-index: 0;
            opacity: 0.35;
            pointer-events: none;
            border: none;
            object-fit: cover;
        }

        .splash-screen > * {
            position: relative;
            z-index: 2;
        }

        .splash-button {
            position: relative;
            z-index: 3;
        }

        .splash-screen .splash-button,
        .splash-screen h2,
        .splash-screen p {
            text-shadow: 0 4px 12px rgba(0, 0, 0, 0.8);
        }

        .splash-screen h2,
        .splash-screen p,
        .splash-screen .splash-button {
            position: relative;
            z-index: 3;
        }

        .splash-content {
            position: relative;
            z-index: 10;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .splash-content h2 {
            font-size: 48px;
            margin: 0;
            z-index: 10;
            text-shadow: 0 4px 15px rgba(0,0,0,0.8);
        }

        .splash-content p {
            font-size: 24px;
            margin: 0;
            color: #dc143c;
            text-shadow: 0 4px 15px rgba(0,0,0,0.8);
        }

        @keyframes splashGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .splash-screen::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600"><defs><pattern id="dots" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse"><circle cx="50" cy="50" r="2" fill="%23dc143c" opacity="0.1"/></pattern></defs><rect width="1200" height="600" fill="url(%23dots)"/></svg>');
            opacity: 0.5;
            pointer-events: none;
            z-index: 2;
        }

        .splash-screen.hidden {
            display: none;
        }

        .splash-button {
            padding: 14px 44px;
            font-size: 18px;
            font-weight: 700;
            background: rgba(220, 20, 60, 0.95);
            border: 2px solid #fff;
            color: #fff;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.35);
            min-width: 220px;
        }

        .splash-button:hover {
            background: rgba(255, 0, 0, 1);
            transform: scale(1.05);
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.45);
        }

        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
        }

        .video-background iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .page-content {
            position: relative;
            text-align: center;
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px;
            background: rgba(0, 0, 0, 0.55);
            border-radius: 20px;
            backdrop-filter: blur(6px);
        }

        .photos {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            overflow-x: auto;
            overflow-y: hidden;
            scroll-behavior: smooth;
            padding-bottom: 10px;
        }
        
        .photos::-webkit-scrollbar {
            height: 8px;
        }
        
        .photos::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
        
        .photos::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.5);
            border-radius: 10px;
        }
        
        .photos::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.7);
        }

        .photos-container {
            position: relative;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .scroll-button {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.5);
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .scroll-button:hover {
            background: rgba(255, 255, 255, 0.4);
            border-color: rgba(255, 255, 255, 0.8);
        }

        .scroll-button:active {
            transform: scale(0.95);
        }

        .photos img {
            width: 360px;
            height: 360px;
            min-width: 360px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.35);
            object-fit: cover;
        }

        .hero-image {
            max-width: 1000px;
            width: 100%;
            height: auto;
            margin-top: 20px;
            border-radius: 16px;
        }
    </style>
</head>
<body>
    <!-- Splash Screen Opening -->
    <div class="splash-screen" id="splashScreen">
        <iframe id="splashVideo" class="splash-video" src="https://www.youtube.com/embed/6Wv1btxCjVE?autoplay=1&mute=1&controls=0&start=0&end=30&playsinline=1&rel=0" title="Ferrari opening video" frameborder="0" allow="autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        <button class="splash-button" onclick="closeSplash()">Enter</button>
    </div>

    <div class="video-background">
        <iframe src="https://www.youtube.com/embed/Po4w52SsNMk?autoplay=1&mute=1&controls=0&loop=1&playlist=Po4w52SsNMk&modestbranding=1&rel=0" title="Ferrari background video" frameborder="0" allow="autoplay; fullscreen"></iframe>
    </div>

    <div class="page-content">
        <h1>Ferrari</h1>
        <h2>Welcome to Ferrari official website</h2>

        <a href="https://www.ferrari.com" target="_blank" >
        <img class="hero-image" src="https://avatars.mds.yandex.net/i?id=c934b39f44c61656675b9e660d98acab30aa680b-9716553-images-thumbs&n=13" alt="Ferrari">
            </a>
        <div class="photos-container">
            <button class="scroll-button" id="scrollLeft">❮</button>
            <div class="photos">
                <img src="https://i.pinimg.com/originals/0d/b1/da/0db1da1283a9a760e37a7b5d76114922.jpg" alt="Ferrari 812">
                <img src="https://i.ytimg.com/vi/XVlf5vmQM_s/maxresdefault.jpg" alt="Ferrari California">
                <img src="https://i.ytimg.com/vi/zopoaJX_vH4/maxresdefault.jpg" alt="Ferrari F12">
                <img src="https://i.pinimg.com/736x/99/15/83/991583983997e0070ae0838fe876110c.jpg" alt="Ferrari 488">
                <img src="https://i.pinimg.com/originals/0d/b1/da/0db1da1283a9a760e37a7b5d76114922.jpg" alt="Ferrari SF90">
                <img src="https://i.ytimg.com/vi/XVlf5vmQM_s/maxresdefault.jpg" alt="Ferrari GTC4">
                <img src="https://i.ytimg.com/vi/zopoaJX_vH4/maxresdefault.jpg" alt="Ferrari LaFerrari">
                <img src="https://i.pinimg.com/736x/99/15/83/991583983997e0070ae0838fe876110c.jpg" alt="Ferrari F8">
            </div>
            <button class="scroll-button" id="scrollRight">❯</button>
        </div>
        <iframe width="560" height="315" src="https://www.youtube.com/embed/BcCEQfnZRjI?si=o6bwEC0WnunXqJ6t" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
        <iframe width="560" height="315" src="https://www.youtube.com/embed/jMB22OtvNeE?si=CYjndjNEh3Ar3oyo" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
        <iframe src="https://www.google.com/maps/embed?pb=!3m2!1sru!2s!4v1782449508006!5m2!1sru!2s!6m8!1m7!1sCAoSF0NJSE0wb2dLRUlDQWdJQ3N0WVB2eVFF!2m2!1d24.48326944404602!2d54.60460843804398!3f153.80381249122672!4f8.373200227838197!5f0.7820865974627469" width="600" height="400" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="strict-origin-when-cross-origin"></iframe>
    </div>

    <script>
        const splash = document.getElementById('splashScreen');
        const splashVideo = document.getElementById('splashVideo');
        let splashLoopInterval;

        function getSplashVideoSrc() {
            return 'https://www.youtube.com/embed/6Wv1btxCjVE?autoplay=1&mute=1&controls=0&start=0&end=30&playsinline=1&rel=0';
        }

        function restartSplashVideo() {
            if (splashVideo) {
                splashVideo.src = getSplashVideoSrc();
            }
        }

        function closeSplash() {
            if (splashLoopInterval) {
                clearInterval(splashLoopInterval);
                splashLoopInterval = null;
            }

            if (!splash.classList.contains('hidden')) {
                splash.classList.add('hidden');
            }
        }

        function startSplashLoop() {
            restartSplashVideo();
            if (splashLoopInterval) {
                clearInterval(splashLoopInterval);
            }
            splashLoopInterval = setInterval(restartSplashVideo, 30000);
        }

        const splashButton = document.querySelector('.splash-button');
        if (splashButton) {
            splashButton.addEventListener('click', closeSplash);
        }

        startSplashLoop();

        // Horizontal scroll with mouse wheel and buttons
        const photosContainer = document.querySelector('.photos');
        const scrollLeftBtn = document.getElementById('scrollLeft');
        const scrollRightBtn = document.getElementById('scrollRight');
        
        // Mouse wheel scrolling
        photosContainer.addEventListener('wheel', (e) => {
            e.preventDefault();
            photosContainer.scrollLeft += e.deltaY;
        });
        
        // Button click scrolling
        scrollLeftBtn.addEventListener('click', () => {
            photosContainer.scrollLeft -= 400;
        });
        
        scrollRightBtn.addEventListener('click', () => {
            photosContainer.scrollLeft += 400;
        });
    </script>
</body>
</html>
